
<!DOCTYPE html>
<html>
<head>
    <title>SkillBridge</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }

        a {
            margin: 10px;
            text-decoration: none;
            color: teal;
            font-weight: bold;
        }

        header {
            background: teal;
            color: white;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            display: inline-block;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<header>
    <h1>SkillBridge</h1>
    <p>Find trusted service providers near you</p>
    <a href="services.html">Services</a> |
    <a href="contact.html">Contact</a>
</header>

<br><br>

<!-- SEARCH -->
<input type="text" placeholder="Search for services..." style="padding:10px; width:250px;">
<button style="padding:10px; background:orange; color:white; border:none;">
Search
</button>

<!-- SERVICES FROM DATABASE -->
<h2>Available Services</h2>
<div id="servicesList"></div>

<!-- STATIC SERVICES -->
<h2>Popular Services</h2>

<div class="card">Plumbing</div>
<div class="card">Tailoring</div>
<div class="card">Cleaning</div>
<div class="card">Graphic Design</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getFirestore, collection, getDocs } 
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC1fquC3ESn2dc06AIQhSwHMB2Sv8e3wy8",
    authDomain: "skillbridge-app-e39f3.firebaseapp.com",
    projectId: "skillbridge-app-e39f3",
    storageBucket: "skillbridge-app-e39f3.firebasestorage.app",
    messagingSenderId: "75622581303",
    appId: "1:75622581303:web:fb0e009a37ec2cc67eabb2"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.signup = function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then(() => alert("Signup successful!"))
      .catch(err => alert(err.message));
  };

  window.login = function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => alert("Login successful!"))
      .catch(err => alert(err.message));
  };

  async function loadServices() {
    const querySnapshot = await getDocs(collection(db, "services"));

    let output = "";

    querySnapshot.forEach((doc) => {
      const data = doc.data();

      output += `
        <div class="card">
          <h3>${data.name}</h3>
          <p>${data.category} - ${data.location}</p>
          <p>⭐ ${data.rating}</p>
        </div>
      `;
    });

    document.getElementById("servicesList").innerHTML = output;
  }

  loadServices();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>SkillBridge</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }

        header {
            background: teal;
            color: white;
            padding: 20px;
        }

        a {
            margin: 10px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        input {
            padding: 10px;
            width: 250px;
            margin: 5px;
        }

        button {
            padding: 10px;
            border: none;
            background: orange;
            color: white;
            cursor: pointer;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            display: inline-block;
            width: 200px;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<header>
    <h1>SkillBridge</h1>
    <p>Find trusted service providers near you</p>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</header>

<br>

<!-- SEARCH -->
<input type="text" placeholder="Search for services...">
<button>Search</button>

<!-- LOGIN SECTION -->
<h2>Login / Sign Up</h2>

<input id="email" type="email" placeholder="Enter email"><br>
<input id="password" type="password" placeholder="Enter password"><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<hr>

<!-- SERVICES -->
<h2>Available Services</h2>
<div id="servicesList"></div>

<!-- STATIC SERVICES -->
<h2>Popular Services</h2>

<div class="card">Plumbing</div>
<div class="card">Tailoring</div>
<div class="card">Cleaning</div>
<div class="card">Graphic Design</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getFirestore, collection, getDocs } 
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  // ✅ CORRECT CONFIG (NEW PROJECT)
  const firebaseConfig = {
    apiKey: "AIzaSyCgV-0KaUdjHyy_YPYRogunS5H01jPBbGg",
    authDomain: "skillbridge-app-56faf.firebaseapp.com",
    projectId: "skillbridge-app-56faf",
    storageBucket: "skillbridge-app-56faf.firebasestorage.app",
    messagingSenderId: "181813326765",
    appId: "1:181813326765:web:4732292cd467a8f7d3a724"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // SIGN UP
  window.signup = function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then(() => alert("Signup successful!"))
      .catch(err => alert(err.message));
  };

  // LOGIN
  window.login = function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => alert("Login successful!"))
      .catch(err => alert(err.message));
  };

  // LOAD SERVICES
  async function loadServices() {
    try {
      const querySnapshot = await getDocs(collection(db, "services"));

      let output = "";

      querySnapshot.forEach((doc) => {
        const data = doc.data();

        output += `
          <div class="card">
            <h3>${data.name}</h3>
            <p>${data.category}</p>
            <p>${data.location}</p>
            <p>⭐ ${data.rating}</p>
          </div>
        `;
      });

      document.getElementById("servicesList").innerHTML = output;

    } catch (error) {
      console.error(error);
      alert("Error loading services");
    }
  }

  loadServices();
</script>

</body>
</html>
